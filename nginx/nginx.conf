# Nginx Configuration for PM2.5 Dashboard
# ปรับปรุงเพื่อรองรับ Airflow 3.0 Routing และป้องกันหน้าเด้งไป Web App

server {
    listen 80 default_server;
    server_name _;
    server_tokens off;
    client_max_body_size 20M;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name _;
    server_tokens off;
    client_max_body_size 20M;

    ssl_certificate /etc/nginx/ssl/live/star_ddc_moph_go_th.crt;
    ssl_certificate_key /etc/nginx/ssl/live/star_ddc_moph_go_th.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # 1. ดักจับทุก Path ที่ Airflow 3.0 ใช้งาน (รวมถึง dags, home, ui)
    location ~ ^/(airflow|ui|auth|static|api|assets|dags|home|login|favicon\.ico) {
        proxy_pass http://airflow-apiserver:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Prefix /airflow;
        
        # บังคับให้การ Redirect ทั้งหมดกลับมาที่ /airflow/
        proxy_redirect / /airflow/;
        proxy_redirect http:// $scheme://;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # 2. Web Application (Next.js)
    location / {
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Utility Redirect
    location = /airflow {
        return 301 https://$http_host/airflow/;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
