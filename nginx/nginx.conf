# Nginx Configuration for Website (Domain Only)
server_tokens off;
client_max_body_size 20M;

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name pm25-patients.ddc.moph.go.th;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name pm25-patients.ddc.moph.go.th;

    ssl_certificate /etc/nginx/ssl/live/star_ddc_moph_go_th.crt;
    ssl_certificate_key /etc/nginx/ssl/live/star_ddc_moph_go_th.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location = /airflow {
        return 301 /airflow/;
    }

    # Proxy to Airflow 3 API server / UI.
    # Keep the /airflow prefix because AIRFLOW__API__BASE_URL is configured with it.
    location /airflow/ {
        proxy_pass http://airflow-webserver:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /airflow;
        proxy_redirect off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    # Proxy to Next.js Web Application
    location / {
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_read_timeout 90;
    }
}
