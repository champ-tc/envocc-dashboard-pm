# Nginx Configuration for PM2.5 Dashboard
# Version: 3.3 (Final Stable for Airflow 3.0)

server {
    listen 80 default_server;
    server_name _;
    server_tokens off;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name _;
    server_tokens off;
    client_max_body_size 20M;

    ssl_certificate /etc/nginx/ssl/live/star_ddc_moph_go_th.crt;
    ssl_certificate_key /etc/nginx/ssl/live/star_ddc_moph_go_th.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # 1. จัดการ Path ทั้งหมดที่ Airflow 3.0 เรียกใช้งาน
    # เราจะส่งไปที่พอร์ต 8080 โดย "ไม่เติม /" ท้าย proxy_pass เพื่อให้ Airflow รับ path เต็มไปจัดการเอง
    location ~ ^/(airflow|ui|auth|static|api|assets|favicon\.ico|login) {
        proxy_pass http://airflow-apiserver:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 443;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # ป้องกันหน้าเด้งไป Root
        proxy_redirect / /airflow/;
        
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # 2. Web Application (Next.js)
    location / {
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Utility Redirect
    location = /airflow {
        return 301 $scheme://$http_host/airflow/;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
