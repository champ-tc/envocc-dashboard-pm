# Nginx Configuration for PM2.5 Dashboard
# Optimized for Airflow 3.0 + Next.js

server {
    listen 80 default_server;
    server_name _;
    server_tokens off;
    client_max_body_size 20M;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name _;
    server_tokens off;
    client_max_body_size 20M;

    ssl_certificate /etc/nginx/ssl/live/star_ddc_moph_go_th.crt;
    ssl_certificate_key /etc/nginx/ssl/live/star_ddc_moph_go_th.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # 1. จัดการ Static Assets และ UI ของ Airflow (แก้หน้าขาว)
    # เราจะดักจับ path ที่ Airflow 3.0 ใช้งานหลักๆ
    location ~ ^/(static|ui|auth|api|assets)/ {
        proxy_pass http://airflow-apiserver:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    # 2. Main Entry สำหรับ Airflow
    location /airflow/ {
        proxy_pass http://airflow-apiserver:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Prefix /airflow;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 3. Web Application (Next.js)
    # Next.js จะใช้ /_next/ และ /data/ เป็นหลัก จึงไม่ตีกับ Airflow
    location / {
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Utility Redirects
    location = /airflow {
        return 301 $scheme://$http_host/airflow/;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
