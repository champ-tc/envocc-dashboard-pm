# Nginx Configuration for PM2.5 Dashboard
# รองรับ Airflow 3.0 (FastAPI UI) + Next.js

server {
    listen 80 default_server;
    server_name _;
    server_tokens off;
    client_max_body_size 20M;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name _;
    server_tokens off;
    client_max_body_size 20M;

    ssl_certificate /etc/nginx/ssl/live/star_ddc_moph_go_th.crt;
    ssl_certificate_key /etc/nginx/ssl/live/star_ddc_moph_go_th.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ---------------------------------------------------------
    # Airflow 3.0 Proxy Blocks (ดักจับทุก Path ที่ Airflow ใช้งาน)
    # ---------------------------------------------------------

    # 1. Main Entry
    location /airflow/ {
        proxy_pass http://airflow-apiserver:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Prefix /airflow;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    # 2. Airflow New UI (FastAPI)
    location /ui/ {
        proxy_pass http://airflow-apiserver:8080/ui/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # 3. Airflow Authentication
    location /auth/ {
        proxy_pass http://airflow-apiserver:8080/auth/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # 4. Airflow Static Assets (Fix White Screen)
    location /static/ {
        proxy_pass http://airflow-apiserver:8080/static/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # 5. Airflow Internal API
    location /api/ {
        proxy_pass http://airflow-apiserver:8080/api/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ---------------------------------------------------------
    # Web Application (Next.js)
    # ---------------------------------------------------------
    location / {
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Utility Redirects
    location = /airflow {
        return 301 $scheme://$http_host/airflow/;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
