name: pm25-dev

services:
  # --- Shared Redis ---
  redis:
    image: redis:7.2-bookworm
    expose: [6379]
    restart: always

  # --- Airflow Metadata DB ---
  postgres:
    image: postgres:16
    env_file: .env
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow_password}
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    restart: always

  # --- ETL Dashboard DB ---
  postgres-etl:
    image: postgres:16
    environment:
      POSTGRES_USER: etl
      POSTGRES_PASSWORD: ${ETL_POSTGRES_PASSWORD:-etl_password}
      POSTGRES_DB: etl_db
    ports: ["15432:5432"]
    volumes:
      - postgres-etl-volume:/var/lib/postgresql/data
    restart: always

  # --- Web Application (Dev Mode) ---
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    env_file: .env
    ports: ["3000:3000"]
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    depends_on: [postgres-etl]
    restart: always

  # --- Airflow (Common for Dev) ---
  airflow-common: &airflow-common
    build: ./airflow
    env_file: .env
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${POSTGRES_PASSWORD:-airflow_password}@postgres/airflow
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:${POSTGRES_PASSWORD:-airflow_password}@postgres/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-FC664xQY5N6L8N6Oq5p0Z5R6v7Y8u9I0G1H2J3K4L5M=}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Bangkok
      AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: Asia/Bangkok
      AIRFLOW__WEBSERVER__BASE_URL: http://localhost/airflow
      AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: 'true'
      AIRFLOW__WEBSERVER__COOKIE_SECURE: 'false'
      AIRFLOW__WEBSERVER__COOKIE_SAMESITE: 'Lax'
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-admin}
      _AIRFLOW_WWW_USER_ROLE: Admin
      _AIRFLOW_WWW_USER_EMAIL: admin@example.com
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/config:/opt/airflow/config
      - ./airflow/plugins:/opt/airflow/plugins
    user: "${AIRFLOW_UID:-501}:0"
    depends_on: [redis, postgres]

  airflow-apiserver:
    <<: *airflow-common
    command: api-server --proxy-headers
    ports: ["8080:8080"]
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -v -p /opt/airflow/{logs,dags,plugins,config}
        /entrypoint airflow db migrate
        /entrypoint airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
    user: "0:0"

  nginx:
    build: ./nginx
    ports: ["80:80"]
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [web, airflow-apiserver]

volumes:
  postgres-db-volume:
  postgres-etl-volume:
