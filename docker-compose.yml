name: pm25

services:
  redis:
    image: redis:7.2-bookworm
    platform: linux/amd64
    restart: always

  postgres:
    image: postgres:16
    platform: linux/amd64
    env_file: [.env]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: [postgres-db-volume:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  postgres-etl:
    image: postgres:16
    platform: linux/amd64
    environment:
      POSTGRES_USER: ${ETL_POSTGRES_USER}
      POSTGRES_PASSWORD: ${ETL_POSTGRES_PASSWORD}
      POSTGRES_DB: ${ETL_POSTGRES_DB}
    ports: ["${ETL_POSTGRES_PORT:-15432}:5432"]
    volumes: [postgres-etl-volume:/var/lib/postgresql/data]
    restart: always

  web:
    image: ghcr.io/champ-tc/envocc-dashboard-pm-web:latest
    platform: linux/amd64
    expose: ["3000"]
    env_file: [.env]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: always

  airflow-common: &airflow-common
    image: ghcr.io/champ-tc/envocc-dashboard-pm-airflow:latest
    platform: linux/amd64
    env_file: [.env]
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__LOGGING_LEVEL: INFO
      # --- Airflow 3.0 Core Security Fixes ---
      AIRFLOW__CORE__AUTH_MANAGER: 'airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager'
      AIRFLOW__FAB__AUTH_BACKENDS: 'airflow.providers.fab.auth_manager.api.auth.backend.session'
      AIRFLOW__API__ALLOW_ORIGINS: '*'
      AIRFLOW__API__HOST: 0.0.0.0
      AIRFLOW__API__PORT: 8080
      AIRFLOW__WEBSERVER__BASE_URL: ${AIRFLOW__WEBSERVER__BASE_URL:-https://192.168.110.5/airflow}
      AIRFLOW__API__BASE_URL: ${AIRFLOW__API__BASE_URL:-https://192.168.110.5/airflow}
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/airflow/execution/
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW__API__SECRET_KEY:-fixed_secret_key_airflow_3_stable_access_2026}
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-fixed_jwt_secret_airflow_3_stable_access_2026}
      FORWARDED_ALLOW_IPS: '*'
      # --- FAB / Cookie Fixes ---
      AIRFLOW__FAB__COOKIE_SECURE: ${AIRFLOW__FAB__COOKIE_SECURE:-False}
      AIRFLOW__FAB__COOKIE_SAMESITE: ${AIRFLOW__FAB__COOKIE_SAMESITE:-Lax}
      # --- DB Connection ---
      DB_HOST: postgres-etl
      DB_USER: ${ETL_POSTGRES_USER}
      DB_PASSWORD: ${ETL_POSTGRES_PASSWORD}
      DB_NAME: ${ETL_POSTGRES_DB}
      DB_PORT: 5432
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/config:/opt/airflow/config
      - ./airflow/plugins:/opt/airflow/plugins

  airflow-webserver:
    <<: *airflow-common
    command: api-server --host 0.0.0.0 --port 8080 --proxy-headers
    user: "0:0"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:8080/airflow/ || curl --fail http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: always
    depends_on:
      airflow-init: { condition: service_completed_successfully }

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    user: "${AIRFLOW_UID:-1000}:0"
    restart: always
    depends_on:
      airflow-init: { condition: service_completed_successfully }

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    user: "${AIRFLOW_UID:-1000}:0"
    restart: always
    depends_on:
      airflow-init: { condition: service_completed_successfully }

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    user: "${AIRFLOW_UID:-1000}:0"
    restart: always
    depends_on:
      airflow-init: { condition: service_completed_successfully }

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -euo pipefail
        : "$${_AIRFLOW_WWW_USER_USERNAME:?Set _AIRFLOW_WWW_USER_USERNAME in .env}"
        : "$${_AIRFLOW_WWW_USER_PASSWORD:?Set _AIRFLOW_WWW_USER_PASSWORD in .env}"
        airflow version
        airflow config get-value core auth_manager
        airflow db migrate
        if airflow fab-db --help >/dev/null 2>&1; then
          airflow fab-db migrate
        fi
        if airflow users list -o plain | awk '{print $$1}' | grep -Fxq "$${_AIRFLOW_WWW_USER_USERNAME}"; then
          airflow users reset-password \
              --username "$${_AIRFLOW_WWW_USER_USERNAME}" \
              --password "$${_AIRFLOW_WWW_USER_PASSWORD}"
        elif airflow users list -o plain | grep -Fq "$${_AIRFLOW_WWW_USER_EMAIL:-admin@example.com}"; then
          echo "Airflow user email $${_AIRFLOW_WWW_USER_EMAIL:-admin@example.com} already exists; keeping the existing user and skipping create."
          airflow users list
        else
          airflow users create \
              --username "$${_AIRFLOW_WWW_USER_USERNAME}" \
              --password "$${_AIRFLOW_WWW_USER_PASSWORD}" \
              --firstname "$${_AIRFLOW_WWW_USER_FIRSTNAME:-Admin}" \
              --lastname "$${_AIRFLOW_WWW_USER_LASTNAME:-User}" \
              --role "$${_AIRFLOW_WWW_USER_ROLE:-Admin}" \
              --email "$${_AIRFLOW_WWW_USER_EMAIL:-admin@example.com}"
        fi
        if [ -f /opt/airflow/config/variables.json ]; then
          airflow variables import /opt/airflow/config/variables.json
        else
          echo "Airflow Variables seed file not found: /opt/airflow/config/variables.json"
        fi
    user: "0:0"
    depends_on:
      postgres: { condition: service_healthy }

  nginx:
    image: ghcr.io/champ-tc/envocc-dashboard-pm-nginx:latest
    platform: linux/amd64
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl/live:ro
    restart: always
    depends_on:
      web: { condition: service_healthy }
      airflow-webserver: { condition: service_healthy }
      airflow-dag-processor: { condition: service_started }

volumes:
  postgres-db-volume:
  postgres-etl-volume:
