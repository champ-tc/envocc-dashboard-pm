name: pm25

services:
  redis:
    image: redis:7.2-bookworm
    platform: linux/amd64
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50

  postgres:
    image: postgres:16
    platform: linux/amd64
    env_file: [.env]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: [postgres-db-volume:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5
    restart: always

  postgres-etl:
    image: postgres:16
    platform: linux/amd64
    environment:
      POSTGRES_USER: ${ETL_POSTGRES_USER}
      POSTGRES_PASSWORD: ${ETL_POSTGRES_PASSWORD}
      POSTGRES_DB: ${ETL_POSTGRES_DB}
    ports: ["${ETL_POSTGRES_PORT:-15432}:5432"]
    volumes: [postgres-etl-volume:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${ETL_POSTGRES_USER}"]
      interval: 10s
      retries: 5
    restart: always

  web:
    image: ghcr.io/champ-tc/envocc-dashboard-pm-web:latest
    platform: linux/amd64
    env_file: [.env]
    environment:
      DUCKDB_DATA_DIR: /shared-data
    expose: ["3000"]
    depends_on:
      postgres-etl: { condition: service_healthy }
    volumes: ["./data/duckdb:/shared-data"]
    restart: always

  airflow-common: &airflow-common
    image: ghcr.io/champ-tc/envocc-dashboard-pm-airflow:latest
    platform: linux/amd64
    env_file: [.env]
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__WEBSERVER__BASE_URL: ${AIRFLOW__WEBSERVER__BASE_URL}
      AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: 'true'
      AIRFLOW__WEBSERVER__PREFERRED_URL_SCHEME: 'https'
      AIRFLOW__WEBSERVER__COOKIE_SECURE: 'False'
      AIRFLOW__WEBSERVER__SESSION_COOKIE_SECURE: 'False'
      AIRFLOW__WEBSERVER__COOKIE_SAMESITE: 'Lax'
      DB_HOST: postgres-etl
      DB_PASSWORD: ${ETL_POSTGRES_PASSWORD}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/config:/opt/airflow/config
      - ./airflow/plugins:/opt/airflow/plugins
      - ./data/duckdb:/shared-data
    user: "${AIRFLOW_UID:-501}:0"
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }

  airflow-apiserver:
    <<: *airflow-common
    command: api-server --proxy-headers
    restart: always
    depends_on:
      airflow-init: { condition: service_completed_successfully }

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init: { condition: service_completed_successfully }

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    restart: always
    depends_on:
      airflow-init: { condition: service_completed_successfully }

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        if [[ -z "$${AIRFLOW_UID}" ]]; then export AIRFLOW_UID=$$(id -u); fi
        mkdir -v -p /opt/airflow/{logs,dags,plugins,config}
        chown -R "$${AIRFLOW_UID}:0" /opt/airflow/
        airflow db migrate
        airflow users create \
            --username "${_AIRFLOW_WWW_USER_USERNAME}" \
            --password "${_AIRFLOW_WWW_USER_PASSWORD}" \
            --firstname Admin \
            --lastname User \
            --role Admin \
            --email admin@example.com || true
    environment:
      <<: *airflow-common-env
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    user: "0:0"

  nginx:
    image: ghcr.io/champ-tc/envocc-dashboard-pm-nginx:latest
    platform: linux/amd64
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy_params:/etc/nginx/conf.d/proxy_params:ro
      - ./nginx/ssl:/etc/nginx/ssl/live:ro
    depends_on:
      web: { condition: service_started }
    restart: always

volumes:
  postgres-db-volume:
  postgres-etl-volume:
