name: pm25

services:
  redis:
    image: redis:7.2-bookworm
    platform: linux/amd64
    restart: always

  postgres:
    image: postgres:16
    platform: linux/amd64
    env_file: [.env]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: [postgres-db-volume:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  postgres-etl:
    image: postgres:16
    platform: linux/amd64
    environment:
      POSTGRES_USER: ${ETL_POSTGRES_USER}
      POSTGRES_PASSWORD: ${ETL_POSTGRES_PASSWORD}
      POSTGRES_DB: ${ETL_POSTGRES_DB}
    ports: ["${ETL_POSTGRES_PORT:-15432}:5432"]
    volumes: [postgres-etl-volume:/var/lib/postgresql/data]
    restart: always

  web:
    image: ghcr.io/champ-tc/envocc-dashboard-pm-web:latest
    platform: linux/amd64
    expose: ["3000"]
    env_file: [.env]
    restart: always

  airflow-common: &airflow-common
    image: ghcr.io/champ-tc/envocc-dashboard-pm-airflow:latest
    platform: linux/amd64
    env_file: [.env]
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__LOGGING_LEVEL: INFO
      # --- Airflow 3.0 Core Security ---
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.session,airflow.providers.fab.auth_manager.api.auth.backend.basic_auth'
      AIRFLOW__API__HOST: 0.0.0.0
      AIRFLOW__API__PORT: 8080
      AIRFLOW__API__ENABLE_GZIP: 'True'
      # --- Webserver / FAB UI Fixes ---
      AIRFLOW__WEBSERVER__SECRET_KEY: 'this_is_a_very_long_permanent_secret_key_airflow_3'
      AIRFLOW__WEBSERVER__BASE_URL: http://192.168.110.5:8080
      AIRFLOW__WEBSERVER__COOKIE_SECURE: 'False'
      AIRFLOW__WEBSERVER__SESSION_COOKIE_SECURE: 'False'
      AIRFLOW__WEBSERVER__COOKIE_SAMESITE: 'Lax'
      AIRFLOW__WEBSERVER__WTF_CSRF_ENABLED: 'False'
      # --- Database Connection for Scripts ---
      DB_HOST: postgres-etl
      DB_USER: ${ETL_POSTGRES_USER}
      DB_PASSWORD: ${ETL_POSTGRES_PASSWORD}
      DB_NAME: ${ETL_POSTGRES_DB}
      DB_PORT: 5432
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/config:/opt/airflow/config
      - ./airflow/plugins:/opt/airflow/plugins

  airflow-webserver:
    <<: *airflow-common
    command: api-server
    user: "0:0" # Force root to prevent permission-related "Something bad has happened"
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      airflow-init: { condition: service_completed_successfully }

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    user: "${AIRFLOW_UID:-1000}:0"
    restart: always
    depends_on:
      airflow-init: { condition: service_completed_successfully }

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    user: "${AIRFLOW_UID:-1000}:0"
    restart: always
    depends_on:
      airflow-init: { condition: service_completed_successfully }

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
            --username "${_AIRFLOW_WWW_USER_USERNAME}" \
            --password "${_AIRFLOW_WWW_USER_PASSWORD}" \
            --firstname Admin --lastname User --role Admin --email admin@example.com || \
        airflow users reset-password \
            --username "${_AIRFLOW_WWW_USER_USERNAME}" \
            --password "${_AIRFLOW_WWW_USER_PASSWORD}"
    user: "0:0"
    depends_on:
      postgres: { condition: service_healthy }

  nginx:
    image: ghcr.io/champ-tc/envocc-dashboard-pm-nginx:latest
    platform: linux/amd64
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl/live:ro
    restart: always

volumes:
  postgres-db-volume:
  postgres-etl-volume:
